version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cybersasi-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    working_dir: /app/src/dashboard/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:18
    container_name: cybersasi-frontend
    working_dir: /app
    volumes:
      - ./src/dashboard/frontend:/app
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE=http://localhost:8000
    command: sh -c "npm install && npm start"
    depends_on:
      - backend
